services:
  - type: web
    name: postsales-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: ccloud-nodejs-client/backend-bridge
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: KAFKA_ENABLED
        value: "true"
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_API_KEY
        sync: false
      - key: KAFKA_API_SECRET
        sync: false
      - key: KAFKA_DISABLE_SSL_VERIFICATION
        value: "false"
      - key: KAFKA_CONSUMER_GROUP_ID
        value: postsales-backend-bridge-group
      - key: INVENTORY_SERVICE_URL
        sync: false
      - key: LEGAL_CONTRACT_SERVICE_URL
        sync: false
      - key: LEGAL_WARRANTY_SERVICE_URL
        sync: false
      - key: LEGAL_ACQUISITION_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
